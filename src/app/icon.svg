<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="500" height="500" fill="transparent"/>

  <!-- Snowflake Base -->
  <g stroke="url(#cyanGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" transform="translate(250, 250)">
    <!-- 6 lines -->
    <line x1="0" y1="-140" x2="0" y2="140" />
    <line x1="-121.2" y1="-70" x2="121.2" y2="70" />
    <line x1="-121.2" y1="70" x2="121.2" y2="-70" />
    
    <!-- Inner branches -->
    <path d="M 0 -80 L 40 -120 M 0 -80 L -40 -120" />
    <path d="M 0 80 L 40 120 M 0 80 L -40 120" />
    <path d="M -69.2 -40 L -103.9 -10 M -69.2 -40 L -103.9 -70" />
    <path d="M 69.2 40 L 103.9 10 M 69.2 40 L 103.9 70" />
    <path d="M -69.2 40 L -103.9 10 M -69.2 40 L -103.9 70" />
    <path d="M 69.2 -40 L 103.9 -10 M 69.2 -40 L 103.9 -70" />
    
    <circle cx="0" cy="0" r="30" fill="url(#cyanGrad)" stroke="none" filter="url(#glow)"/>
  </g>

  <!-- Miami Warmth / Breeze Overlay -->
  <path d="M 250 80 Q 320 20 380 90 T 430 250 Q 350 350 250 250" fill="none" stroke="url(#pinkGrad)" stroke-width="20" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>
</svg>
